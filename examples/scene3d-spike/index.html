<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GoSX Scene3D Spike — R1 End-to-End</title>
    <style>
      :root { color-scheme: dark; font-family: "IBM Plex Sans", system-ui, sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center;
             background: #0f1720; color: #f3f1ec; padding: 24px; }
      main { text-align: center; max-width: 760px; }
      canvas { width: 760px; max-width: 100%; height: 520px; border-radius: 14px;
               box-shadow: 0 20px 60px rgba(0,0,0,0.5); background: #000; display: block; margin: 0 auto; }
      .status { margin: 16px 0; padding: 8px 14px; border-radius: 999px;
                background: rgba(255,255,255,0.08); display: inline-block; font-weight: 600; }
      .pass { background: rgba(52, 199, 89, 0.18); color: #c1f3cf; }
      .fail { background: rgba(255, 69, 58, 0.18);  color: #ffb8b2; }
      p { line-height: 1.5; opacity: 0.85; }
      code { background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 4px; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <main>
      <h1>GoSX Scene3D Spike</h1>
      <p>
        75 instanced cubes rendered by <code>render/bundle.Renderer</code>
        talking <code>navigator.gpu</code> through <code>render/gpu/jsgpu</code>.
        Zero JS renderer code.
      </p>
      <div id="status" class="status">Booting wasm runtime…</div>
      <br />
      <canvas id="stage" width="1520" height="1040"></canvas>
    </main>
    <script src="/wasm_exec.js"></script>
    <script type="module">
      const statusEl = document.getElementById("status");
      const setStatus = (msg, cls = "") => {
        statusEl.textContent = msg;
        statusEl.className = `status ${cls}`.trim();
      };

      if (!("gpu" in navigator)) {
        setStatus("WebGPU is not available in this browser.", "fail");
        throw new Error("WebGPU unavailable");
      }

      const go = new Go();
      const wasm = await WebAssembly.instantiateStreaming(fetch("./main.wasm"), go.importObject);
      go.run(wasm.instance);

      const waitForEntry = async () => {
        for (let i = 0; i < 400; i += 1) {
          if (typeof window.gosxScene3DSpikeStart === "function") return;
          await new Promise((r) => setTimeout(r, 10));
        }
        throw new Error("gosxScene3DSpikeStart was not registered");
      };

      try {
        await waitForEntry();
        setStatus("Initializing WebGPU…");
        const result = await window.gosxScene3DSpikeStart("stage");
        setStatus(`Running — ${result.instances} instanced cubes`, "pass");
      } catch (err) {
        const msg = err instanceof Error ? err.message : String(err);
        setStatus(`Failed: ${msg}`, "fail");
      }
    </script>
  </body>
</html>
