<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GoSX VecDB WebGPU Smoke</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(0, 120, 92, 0.14), transparent 35%),
          linear-gradient(180deg, #f4f0e8 0%, #ebe0cf 100%);
        color: #1d242c;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(760px, 100%);
        background: rgba(255, 251, 244, 0.94);
        border: 1px solid rgba(29, 36, 44, 0.12);
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(29, 36, 44, 0.12);
        padding: 28px;
      }
      h1 { margin: 0 0 8px; }
      p { margin: 0 0 16px; line-height: 1.5; }
      pre {
        margin: 0;
        padding: 16px;
        border-radius: 14px;
        background: #0f1720;
        color: #f3f1ec;
        min-height: 180px;
        overflow: auto;
      }
      .status {
        display: inline-flex;
        padding: 8px 12px;
        border-radius: 999px;
        margin-bottom: 18px;
        background: rgba(29, 36, 44, 0.08);
        font-weight: 600;
      }
      .pass { background: rgba(15, 117, 72, 0.15); color: #0c5b38; }
      .fail { background: rgba(176, 38, 38, 0.12); color: #8e1d1d; }
    </style>
  </head>
  <body>
    <main>
      <div id="status" class="status">Booting wasm runtime…</div>
      <h1>GoSX VecDB WebGPU Smoke</h1>
      <p>
        This page validates that `vecdb` switches to the uploaded GPU prepared-search
        corpus, preserves top-k results, and invalidates the GPU cache on mutation.
      </p>
      <pre id="output"></pre>
    </main>
    <script src="/wasm_exec.js"></script>
    <script type="module">
      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");

      const setStatus = (message, cls = "") => {
        statusEl.textContent = message;
        statusEl.className = `status ${cls}`.trim();
      };

      const go = new Go();
      const wasm = await WebAssembly.instantiateStreaming(fetch("./main.wasm"), go.importObject);
      go.run(wasm.instance);

      const waitForRunner = async () => {
        for (let i = 0; i < 200; i += 1) {
          if (typeof window.runVecdbWebGPUSmoke === "function") return;
          await new Promise((resolve) => setTimeout(resolve, 25));
        }
        throw new Error("runVecdbWebGPUSmoke was not registered");
      };

      try {
        await waitForRunner();
        setStatus("Running vecdb smoke…");
        const result = await window.runVecdbWebGPUSmoke();
        window.__vecdbWebGPUSmokeResult = result;
        outputEl.textContent = JSON.stringify(result, null, 2);
        setStatus(result.passed ? "Smoke passed" : "Smoke failed", result.passed ? "pass" : "fail");
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        window.__vecdbWebGPUSmokeError = message;
        outputEl.textContent = message;
        setStatus("Smoke failed", "fail");
      }
    </script>
  </body>
</html>
