name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Release gate
        run: make release-gate

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Node dependencies
        run: npm ci

      - name: Install Danmuji
        run: go install github.com/odvcencio/danmuji/cmd/danmuji@v0.3.2

      - name: Format check
        run: make fmt-check

      - name: Danmuji generated spec check
        run: make verify-danmuji

      - name: Install TinyGo
        env:
          TINYGO_VERSION: 0.41.1
        run: |
          curl -fsSL -o tinygo.deb "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb"
          sudo dpkg -i tinygo.deb
          go install golang.org/dl/go1.25.5@latest
          go1.25.5 download
          tinygo version

      - name: Unit and integration tests
        run: make test

      - name: Race tests
        run: make test-race

      - name: Fuzz smoke tests
        run: make test-fuzz-smoke

      - name: JavaScript runtime contract tests
        run: make test-js

      - name: WASM runtime tests
        run: make test-wasm

      - name: Island-only WASM runtime tests
        run: make test-wasm-islands

      - name: WASM size-budget gate
        run: make wasm-size-budget

      - name: Browser docs E2E gate
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: make test-e2e

      - name: Perf budget gate
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          PLAYWRIGHT_CHROMIUM_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: make perf-budget-ci

      - name: Production water bundle smoke test
        run: make test-water-prod

      - name: Build CLI
        run: make build-cli

      - name: Build WASM runtime
        run: make build-runtime

  # Opt-in certification for a self-hosted runner with a real GPU. Generic
  # GitHub runners use SwiftShader and cannot produce meaningful WebGPU frame
  # timing. Set WATER_WEBGPU_RUNNER to the runner label to enable this job.
  water-webgpu-certification:
    if: ${{ vars.WATER_WEBGPU_RUNNER != '' }}
    runs-on: ${{ vars.WATER_WEBGPU_RUNNER }}
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Certify water on hardware WebGPU
        env:
          GOSX_WATER_E2E_REQUIRE_WEBGPU: "1"
          PLAYWRIGHT_CHROMIUM_EXECUTABLE: ${{ vars.WATER_WEBGPU_CHROME }}
        run: node --test e2e/water_demo_e2e.test.mjs
