name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Node dependencies
        run: npm ci

      - name: Install Danmuji
        run: go install github.com/odvcencio/danmuji/cmd/danmuji@v0.3.2

      - name: Format check
        run: make fmt-check

      - name: Danmuji generated spec check
        run: make verify-danmuji

      - name: Unit and integration tests
        run: make test

      - name: Race tests
        run: make test-race

      - name: Fuzz smoke tests
        run: make test-fuzz-smoke

      - name: JavaScript runtime contract tests
        run: make test-js

      - name: WASM runtime tests
        run: make test-wasm

      - name: Island-only WASM runtime tests
        run: make test-wasm-islands

      - name: Browser docs E2E gate
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE: ${{ steps.chrome.outputs.chrome-path }}
        run: make test-e2e

      - name: Build CLI
        run: make build-cli

      - name: Build WASM runtime
        run: make build-runtime
