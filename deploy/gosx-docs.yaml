# The gosx-docs Secret is provisioned out-of-band. It must contain a
# `session-secret` key; never commit the secret value to this manifest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gosx-docs
  namespace: draco-quest
  labels:
    app: gosx-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gosx-docs
  template:
    metadata:
      labels:
        app: gosx-docs
    spec:
      containers:
        - name: gosx-docs
          image: harbor.draco.quest/library/gosx-docs@sha256:e1094630018a1a0951fdaed35a972fe3cfe59ed86f297e92079abd09e9744b18
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: PUBLIC_URL
              value: https://gosx.m31labs.dev
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: gosx-docs
                  key: session-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gosx-docs
  namespace: draco-quest
spec:
  selector:
    app: gosx-docs
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gosx-docs
  namespace: draco-quest
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-issuer
    traefik.ingress.kubernetes.io/router.priority: "20"
spec:
  ingressClassName: traefik
  rules:
    - host: gosx.m31labs.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gosx-docs
                port:
                  name: http
  tls:
    - hosts:
        - gosx.m31labs.dev
      secretName: gosx-docs-tls
